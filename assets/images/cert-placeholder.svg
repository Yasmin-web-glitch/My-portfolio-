<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="neonCyanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="600" height="400" fill="url(#darkBg)" rx="12" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Outer Border line with offset -->
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="url(#neonCyanBlue)" stroke-dasharray="12, 12" stroke-width="1" opacity="0.3" rx="8" />
  
  <!-- Corner Tech accents -->
  <path d="M 20 40 L 20 20 L 40 20" fill="none" stroke="url(#neonCyanBlue)" stroke-width="2.5" filter="url(#neonGlow)" />
  <path d="M 580 40 L 580 20 L 560 20" fill="none" stroke="url(#neonCyanBlue)" stroke-width="2.5" filter="url(#neonGlow)" />
  <path d="M 20 360 L 20 380 L 40 380" fill="none" stroke="url(#neonCyanBlue)" stroke-width="2.5" filter="url(#neonGlow)" />
  <path d="M 580 360 L 580 380 L 560 380" fill="none" stroke="url(#neonCyanBlue)" stroke-width="2.5" filter="url(#neonGlow)" />

  <!-- Center Credentials Logo Seal -->
  <circle cx="300" cy="120" r="45" fill="#030712" stroke="url(#neonCyanBlue)" stroke-width="2" filter="url(#neonGlow)" />
  <!-- Seal Ribbon or Inner tech detail -->
  <polygon points="290,120 280,180 300,170 320,180 310,120" fill="none" stroke="#4facfe" stroke-width="1.5" opacity="0.7" />
  <!-- Checkmark or Badge Icon in Seal -->
  <path d="M288,118 L296,126 L312,110" fill="none" stroke="#00f2fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />

  <!-- Certificate Text -->
  <text x="300" y="210" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="900" fill="#f3f4f6" text-anchor="middle" letter-spacing="2">VERIFIED CREDENTIAL</text>
  
  <text x="300" y="240" font-family="'Outfit', 'Inter', sans-serif" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="1">ISSUED BY PROFESSIONAL PROVIDER</text>

  <!-- Divider Line -->
  <line x1="180" y1="265" x2="420" y2="265" stroke="url(#neonCyanBlue)" stroke-width="1" opacity="0.3" />

  <text x="300" y="300" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="600" fill="url(#neonCyanBlue)" text-anchor="middle" filter="url(#neonGlow)">Certificate Preview Placeholder</text>
  <text x="300" y="322" font-family="'Outfit', 'Inter', sans-serif" font-size="11" fill="#475569" text-anchor="middle">Replace this image file to display your real certificate</text>

  <!-- Serial / Verification ID at footer -->
  <text x="50" y="360" font-family="monospace" font-size="9" fill="#334155">ID: JY-CERT-2026-XXXX</text>
  <text x="550" y="360" font-family="monospace" font-size="9" fill="#334155" text-anchor="end">STATUS: ACTIVE</text>
</svg>
