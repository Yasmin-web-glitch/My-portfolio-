<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="neonCyanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="30" />
  
  <!-- Tech Grid Background -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.3">
    <line x1="50" y1="0" x2="50" y2="400" />
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="250" y1="0" x2="250" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="350" y1="0" x2="350" y2="400" />
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="350" x2="400" y2="350" />
  </g>

  <!-- Glowing concentric tech circles -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.1" />
  <circle cx="200" cy="200" r="130" fill="none" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="10, 15" opacity="0.2" />
  <circle cx="200" cy="200" r="110" fill="none" stroke="url(#neonCyanBlue)" stroke-width="2" opacity="0.4" filter="url(#neonGlow)" />

  <!-- Avatar Silhouette -->
  <g transform="translate(100, 100)">
    <!-- Shoulders -->
    <path d="M25,170 C25,140 50,110 100,110 C150,110 175,140 175,170" fill="none" stroke="url(#neonCyanBlue)" stroke-width="5" filter="url(#neonGlow)" />
    <!-- Head -->
    <circle cx="100" cy="65" r="35" fill="#030712" stroke="url(#neonCyanBlue)" stroke-width="4" filter="url(#neonGlow)" />
    <!-- Code Bracket overlays -->
    <text x="30" y="80" font-family="monospace" font-size="28" font-weight="bold" fill="#00f2fe" opacity="0.7" filter="url(#neonGlow)">&lt;</text>
    <text x="150" y="80" font-family="monospace" font-size="28" font-weight="bold" fill="#4facfe" opacity="0.7" filter="url(#neonGlow)">&gt;</text>
  </g>

  <!-- Developer Title Tag -->
  <rect x="120" y="320" width="160" height="35" rx="10" fill="#0b1329" stroke="url(#neonCyanBlue)" stroke-width="1.5" opacity="0.8" />
  <text x="200" y="342" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="bold" fill="#f3f4f6" text-anchor="middle" letter-spacing="1">FULL STACK DEV</text>
</svg>
