<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle with neon border -->
  <circle cx="50" cy="50" r="45" fill="#030712" stroke="url(#neonGlow)" stroke-width="4" filter="url(#glow)" />
  <!-- Logo Letters -->
  <text x="50" y="60" font-family="'Outfit', 'Inter', sans-serif" font-size="34" font-weight="900" fill="url(#neonGlow)" text-anchor="middle" filter="url(#glow)" letter-spacing="1">JY</text>
</svg>
